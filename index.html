    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #25a18e 0%, #4cc9f0 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .site-header {
            max-width: 900px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 0;
        }
        .site-logo {
            font-size: 28px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .site-logo span {
            color: #ffd166;
        }
      
        

        /* Reset dasar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Container utama - menyatukan sidebar dan konten */
        .main-container {
            display: flex;
            height: 100vh; /* Isi seluruh tinggi layar */
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background-color: #25a18e;
            color: white;
            transition: transform 0.3s ease; /* Animasi saat muncul/sembunyi */
            position: fixed; /* Tetap di tempat, tidak menggeser konten */
            height: 100%;
            transform: translateX(-100%); /* Sembunyi awalnya */
            z-index: 2; /* Di atas overlay dan konten */
        }

        .sidebar.active {
            transform: translateX(0); /* Muncul saat aktif */
        }

        /* Tombol hamburger */
        .menu-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            font-size: 24px;
            cursor: pointer;
            z-index: 3; /* Di atas semua elemen */
        }

        /* Overlay - untuk memisahkan menu dengan konten */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color:#25a18e(0,0,0,0.5);
            display: none; /* Sembunyi awalnya */
            z-index: 1; /* Di bawah sidebar, di atas konten */
        }

        .overlay.active {
            display: block; /* Muncul saat sidebar aktif */
        }

        /* Konten utama */
        .content {
            width: 100%;
            padding: 20px;
            padding-left: 50px; /* Beri jarak agar tidak tertutupi tombol hamburger */
            transition: padding-left 0.3s ease;
        }
        /* Konsistensi warna dan ukuran font */
        body {
            font-size: 1rem;
            line-height: 1.5;
        }
        .card {
            border-radius: 0.375rem !important;
        }
    </style>

    <script>
        // Toggle Sidenav di Mobile
        const sidenavToggle = document.getElementById('sidenavToggle');
        const sidenavNav = document.getElementById('layoutSidenav_nav');
        const sidenavOverlay = document.getElementById('sidenavOverlay');
        const navLinks = document.querySelectorAll('.nav-link'); // Ambil semua link menu

        sidenavToggle.addEventListener('click', (e) => {
            e.stopPropagation(); // Hindari konflik klik
            sidenavNav.classList.toggle('active');
            sidenavOverlay.classList.toggle('active');
        });

        sidenavOverlay.addEventListener('click', () => {
            sidenavNav.classList.remove('active');
            sidenavOverlay.classList.remove('active');
        });

        // Tutup sidenav saat menu diklik di mobile
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth < 768) {
                    sidenavNav.classList.remove('active');
                    sidenavOverlay.classList.remove('active');
                }
            });
        });

        // Tutup sidenav saat layar diperbesar
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) {
                sidenavNav.classList.remove('active');
                sidenavOverlay.classList.remove('active');
            }
        });

        // Pastikan Bootstrap Collapse berfungsi dengan benar
        document.addEventListener('DOMContentLoaded', () => {
            const collapses = document.querySelectorAll('.collapse');
            collapses.forEach(collapse => {
                new bootstrap.Collapse(collapse, {
                    toggle: false
                });
            });
        });
    </script>
