<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Si Labaku - Login</title>
    <link rel="shortcut icon" href="#" type="image/x-icon">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #25a18e 0%, #4cc9f0 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .site-header {
            max-width: 900px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 0;
        }
        .site-logo {
            font-size: 28px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .site-logo span {
            color: #ffd166;
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .tab-header {
            display: flex;
            background-color: #f8f9fa;
        }
        .tab-btn {
            flex: 1;
            padding: 18px;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #555;
        }
        .tab-btn.active {
            background: white;
            color: #25a18e;
            border-bottom: 2px solid #25a18e;
        }
        .tab-content {
            padding: 30px;
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .section-title {
            color: #2d3e40;
            margin-bottom: 25px;
            text-align: center;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .section-title::before,
        .section-title::after {
            content: "";
            width: 30px;
            height: 2px;
            background-color: #25a18e;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            color: #2d3e40;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #25a18e;
            box-shadow: 0 0 0 2px rgba(37, 161, 142, 0.15);
        }
        .btn-action {
            width: 100%;
            padding: 13px;
            background: #25a18e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }
        .btn-action:hover {
            background: #1a7a6b;
        }
        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .link-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0 15px;
        }
        .small-link {
            font-size: 14px;
            color: #555;
            text-align: center;
            padding: 20px 0 10px;
            border-top: 1px solid #eee;
            margin-top: 15px;
        }
        .small-link a {
            color: #25a18e;
            text-decoration: none;
            font-weight: 500;
        }
        .small-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Header Website -->
    <header class="site-header">
        <div class="site-logo">Si <span>Labaku</span></div>
    </header>

    <!-- Container Login -->
    <div class="container">
        <div class="tab-header">
            <button class="tab-btn active" onclick="showTab('login')">Login</button>
        </div>

        <!-- Tab Login -->
        <div id="login" class="tab-content active">
            <div id="login-alert" class="alert"></div>
            <h3 class="section-title">Masuk ke Si Labaku</h3>
            <form id="login-form">
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required placeholder="Masukkan email sekolah Anda">
                </div>
                <div class="input-group">
                    <label for="login-password">Kata Sandi</label>
                    <input type="password" id="login-password" required placeholder="Minimal 6 karakter">
                </div>
                <div class="link-group">
                    <a href="password.html" class="small">Lupa Password?</a>
                </div>
                <button type="submit" class="btn-action">Login</button>
                
                <div class="small-link">
                    Belum punya akun? <a href="register.html">Daftar di sini</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Fungsi untuk mengganti tab (hanya untuk keamanan, meskipun tidak ada tab lain)
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            document.querySelector(`.tab-btn[onclick="showTab('${tabName}')"]`).classList.add('active');
            document.getElementById('login-alert').style.display = 'none';
        }

        // Data pengguna Si Labaku
        let silabakuUsers = JSON.parse(localStorage.getItem('silabaku_users')) || [];

        // Proses Login (hanya bagian yang diperlukan di halaman ini)
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const alert = document.getElementById('login-alert');
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            // Cari pengguna berdasarkan email dan password
            const user = silabakuUsers.find(u => u.email === email && u.password === password);

            if (user) {
                // Simpan pengguna yang sedang aktif
                localStorage.setItem('silabaku_currentUser', JSON.stringify(user));
                // Arahkan ke halaman utama (pastikan file index.html ada)
                window.location.href = "index.html";
            } else {
                alert.className = 'alert error';
                alert.textContent = 'Email atau password salah!';
            }
        });
    </script>
</body>
</html>
