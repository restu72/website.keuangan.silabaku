<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Si Labaku - Lupa Password</title>
    <link rel="shortcut icon" href="#" type="image/x-icon">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #25a18e 0%, #4cc9f0 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .site-header {
            max-width: 900px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .site-logo {
            font-size: 28px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .site-logo span {
            color: #ffd166;
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .tab-content {
            padding: 30px;
        }
        .section-title {
            color: #2d3e40;
            margin-bottom: 25px;
            text-align: center;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .section-title::before,
        .section-title::after {
            content: "";
            width: 30px;
            height: 2px;
            background-color: #25a18e;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            color: #2d3e40;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #25a18e;
            box-shadow: 0 0 0 2px rgba(37, 161, 142, 0.15);
        }
        .btn-action {
            width: 100%;
            padding: 13px;
            background: #25a18e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-action:hover {
            background: #1a7a6b;
        }
        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .alert.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        .link-section {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .link-section a {
            color: #25a18e;
            text-decoration: none;
            font-weight: 500;
        }
        .link-section a:hover {
            text-decoration: underline;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Header Website -->
    <header class="site-header">
        <div class="site-logo">Si <span>Labaku</span></div>
    </header>

    <!-- Container Lupa Password -->
    <div class="container">
        <!-- Langkah 1: Masukkan Email -->
        <div id="step1" class="tab-content">
            <div id="alert-step1" class="alert"></div>
            <h3 class="section-title">Reset Kata Sandi</h3>
            <form id="form-step1">
                <div class="input-group">
                    <label for="user-email">Email</label>
                    <input type="email" id="user-email" required placeholder="email yang didaftarkan">
                </div>
                <button type="submit" class="btn-action">Kirim Link Reset</button>
                <div class="link-section">
                    <a href="login.html">Kembali ke Halaman Login</a>
                </div>
            </form>
        </div>

        <!-- Langkah 2: Verifikasi Kode -->
        <div id="step2" class="tab-content hidden">
            <div id="alert-step2" class="alert"></div>
            <h3 class="section-title">Verifikasi Akun</h3>
            <form id="form-step2">
                <div class="input-group">
                    <label for="verification-code">Kode Verifikasi</label>
                    <input type="text" id="verification-code" required placeholder="Masukkan kode 6 digit yang dikirim ke email">
                </div>
                <button type="submit" class="btn-action">Verifikasi</button>
            </form>
        </div>

        <!-- Langkah 3: Atur Password Baru -->
        <div id="step3" class="tab-content hidden">
            <div id="alert-step3" class="alert"></div>
            <h3 class="section-title">Atur Password Baru</h3>
            <form id="form-step3">
                <input type="hidden" id="reset-email">
                <div class="input-group">
                    <label for="new-password">Kata Sandi Baru</label>
                    <input type="password" id="new-password" required placeholder="Minimal 6 karakter (huruf + angka)">
                </div>
                <div class="input-group">
                    <label for="confirm-new-password">Konfirmasi Kata Sandi</label>
                    <input type="password" id="confirm-new-password" required placeholder="Ulangi kata sandi baru">
                </div>
                <button type="submit" class="btn-action">Simpan Password Baru</button>
            </form>
        </div>
    </div>

    <script>
        // Ambil data pengguna dari localStorage
        let silabakuUsers = JSON.parse(localStorage.getItem('silabaku_users')) || [];
        
        // Fungsi untuk menampilkan langkah
        function showStep(stepId) {
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
                content.classList.remove('active');
            });
            document.querySelectorAll('.alert').forEach(alert => alert.style.display = 'none');
            document.getElementById(stepId).classList.remove('hidden');
            document.getElementById(stepId).classList.add('active');
        }

        // Langkah 1: Kirim Link Reset
        document.getElementById('form-step1').addEventListener('submit', function(e) {
            e.preventDefault();
            const alert = document.getElementById('alert-step1');
            const email = document.getElementById('user-email').value.trim();
            
            // Cek apakah email terdaftar
            const userExists = silabakuUsers.some(user => user.email === email);
            if (!userExists) {
                alert.className = 'alert error';
                alert.textContent = 'Email tidak terdaftar di Si Labaku!';
                return;
            }

            // Simulasi kirim kode verifikasi
            alert.className = 'alert info';
            alert.textContent = 'Kode verifikasi telah dikirim ke email Anda!';
            document.getElementById('reset-email').value = email;
            
            // Pindah ke langkah 2
            setTimeout(() => showStep('step2'), 2500);
        });

        // Langkah 2: Verifikasi Kode
        document.getElementById('form-step2').addEventListener('submit', function(e) {
            e.preventDefault();
            const alert = document.getElementById('alert-step2');
            const code = document.getElementById('verification-code').value;
            
            // Simulasi kode verifikasi (dalam produksi dari email)
            if (code.length !== 6) {
                alert.className = 'alert error';
                alert.textContent = 'Kode verifikasi harus 6 digit!';
                return;
            }

            alert.className = 'alert success';
            alert.textContent = 'Verifikasi berhasil!';
            
            // Pindah ke langkah 3
            setTimeout(() => showStep('step3'), 2000);
        });

        // Langkah 3: Atur Password Baru
        document.getElementById('form-step3').addEventListener('submit', function(e) {
            e.preventDefault();
            const alert = document.getElementById('alert-step3');
            const email = document.getElementById('reset-email').value;
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-new-password').value;

            if (newPass.length < 6) {
                alert.className = 'alert error';
                alert.textContent = 'Kata sandi minimal 6 karakter!';
                return;
            }
            if (newPass !== confirmPass) {
                alert.className = 'alert error';
                alert.textContent = 'Konfirmasi kata sandi tidak cocok!';
                return;
            }

            // Update password di localStorage
            silabakuUsers = silabakuUsers.map(user => {
                if (user.email === email) return { ...user, password: newPass };
                return user;
            });
            localStorage.setItem('silabaku_users', JSON.stringify(silabakuUsers));

            alert.className = 'alert success';
            alert.textContent = 'Password berhasil diubah! Arahkan ke login...';
            setTimeout(() => window.location.href = 'login.html', 2500);
        });
    </script>
</body>
</html>
